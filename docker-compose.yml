services:
  # Service Database PostgreSQL
  database:
    image: postgres:15-alpine
    container_name: notes-db
    restart: always
    environment:
      - POSTGRES_DB=notesdb
      - POSTGRES_USER=notesuser
      - POSTGRES_PASSWORD=notespassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network

  # Service Backend Node.js
  backend:
    build:
      context: ./backend
    container_name: notes-backend
    restart: always
    environment:
      # Gunakan nama service 'database' sebagai host
      - DB_HOST=database
      - DB_PORT=5432
      - DB_NAME=notesdb
      - DB_USER=notesuser
      - DB_PASSWORD=notespassword
    depends_on:
      - database
    networks:
      - app-network

  # Service Frontend Nginx
  frontend:
    build:
      context: ./frontend
    container_name: notes-frontend
    restart: always
    ports:
      # Buka port 8080 di host dan sambungkan ke port 80 di container
      - "8080:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
